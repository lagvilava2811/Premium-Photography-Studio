<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Anuka Abazadze Photography</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/tokens/primitives.css">
    <link rel="stylesheet" href="css/tokens/semantic.css">
    <link rel="stylesheet" href="css/base/reset.css">
    <link rel="stylesheet" href="css/base/typography.css">
    <link rel="stylesheet" href="css/components/buttons.css">
    <link rel="stylesheet" href="css/components/cards.css">
    <style>
        /* Admin specific styles */
        body {
            background: var(--semantic-bg-primary, #030712);
            font-family: 'Inter', sans-serif;
        }
        
        #admin-container {
            min-height: 100vh;
            padding: 2rem;
        }
        
        .admin-login {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .admin-login-card {
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            background: var(--semantic-bg-surface, #1F2937);
            border-radius: 1rem;
            border: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
        }
        
        .admin-login-card h2 {
            margin-bottom: 0.5rem;
            color: var(--semantic-text-primary, #FFFFFF);
        }
        
        .admin-login-card p {
            margin-bottom: 1.5rem;
            color: var(--semantic-text-muted, #9CA3AF);
        }
        
        .admin-dashboard {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
        }
        
        .admin-header h1 {
            font-size: 1.5rem;
            color: var(--semantic-text-primary, #FFFFFF);
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1.5rem;
            background: var(--semantic-bg-surface, #1F2937);
            border-radius: 0.75rem;
            border: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
        }
        
        .stat-icon {
            font-size: 2rem;
        }
        
        .stat-info {
            display: flex;
            flex-direction: column;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--semantic-brand-primary, #D4AF37);
        }
        
        .stat-label {
            font-size: 0.75rem;
            color: var(--semantic-text-muted, #9CA3AF);
        }
        
        .admin-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
        }
        
        .tab-btn {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            color: var(--semantic-text-muted, #9CA3AF);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }
        
        .tab-btn:hover {
            color: var(--semantic-text-primary, #FFFFFF);
        }
        
        .tab-btn.active {
            color: var(--semantic-brand-primary, #D4AF37);
        }
        
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--semantic-brand-primary, #D4AF37);
        }
        
        .admin-tab {
            display: none;
        }
        
        .admin-tab.active {
            display: block;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .admin-table th,
        .admin-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
        }
        
        .admin-table th {
            color: var(--semantic-brand-primary, #D4AF37);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .admin-table td {
            color: var(--semantic-text-secondary, #D1D5DB);
        }
        
        .status-select {
            padding: 0.5rem;
            background: var(--semantic-bg-secondary, #0F172A);
            border: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
            border-radius: 0.5rem;
            color: var(--semantic-text-primary, #FFFFFF);
            cursor: pointer;
        }
        
        .delete-booking,
        .delete-portfolio {
            padding: 0.5rem 1rem;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 0.5rem;
            color: #EF4444;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .delete-booking:hover,
        .delete-portfolio:hover {
            background: rgba(239, 68, 68, 0.3);
        }
        
        .gallery-upload {
            background: var(--semantic-bg-surface, #1F2937);
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .gallery-upload h3 {
            margin-bottom: 1rem;
            color: var(--semantic-text-primary, #FFFFFF);
        }
        
        .upload-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .form-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--semantic-text-muted, #9CA3AF);
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            background: var(--semantic-bg-secondary, #0F172A);
            border: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
            border-radius: 0.5rem;
            color: var(--semantic-text-primary, #FFFFFF);
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--semantic-brand-primary, #D4AF37);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }
        
        .form-group select {
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 2.5rem;
        }
        
        .form-group input[type="file"] {
            padding: 0.5rem;
            background: var(--semantic-bg-surface, #1F2937);
            cursor: pointer;
        }
        
        .form-group input[type="file"]::file-selector-button {
            padding: 0.5rem 1rem;
            margin-right: 1rem;
            background: var(--semantic-brand-primary, #D4AF37);
            color: #000;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        
        .form-group input[type="file"]::file-selector-button:hover {
            background: #FDE047;
        }
        
        .form-group input[type="number"] {
            -moz-appearance: textfield;
            width: 100%;
        }
        
        .form-group input[type="number"]::-webkit-outer-spin-button,
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        
        .form-group input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.5rem;
            height: 1.5rem;
            background: var(--semantic-bg-secondary, #0F172A);
            border: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
            border-radius: 0.25rem;
            cursor: pointer;
            position: relative;
            padding: 0;
            display: inline-block;
            vertical-align: middle;
        }
        
        .form-group input[type="checkbox"]:checked {
            background: var(--semantic-brand-primary, #D4AF37);
            border-color: var(--semantic-brand-primary, #D4AF37);
        }
        
        .form-group input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #000;
            font-size: 1rem;
            font-weight: bold;
        }
        
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }
        
        .portfolio-item-admin {
            background: var(--semantic-bg-surface, #1F2937);
            border-radius: 0.75rem;
            overflow: hidden;
            border: 1px solid var(--semantic-border-light, rgba(255,255,255,0.1));
        }
        
        .portfolio-item-admin img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        
        .portfolio-item-admin .info {
            padding: 1rem;
        }
        
        .portfolio-item-admin .info h4 {
            color: var(--semantic-text-primary, #FFFFFF);
            margin-bottom: 0.25rem;
        }
        
        .portfolio-item-admin .info p {
            font-size: 0.75rem;
            color: var(--semantic-text-muted, #9CA3AF);
        }
        
        .portfolio-item-admin .delete-portfolio {
            margin: 0 1rem 1rem;
            width: calc(100% - 2rem);
        }
        
        .seo-settings {
            max-width: 600px;
            background: var(--semantic-bg-surface, #1F2937);
            border-radius: 0.75rem;
            padding: 1.5rem;
        }
        
        .seo-settings h3 {
            margin-bottom: 1rem;
            color: var(--semantic-text-primary, #FFFFFF);
        }
        
        .no-items {
            text-align: center;
            padding: 3rem;
            color: var(--semantic-text-muted, #9CA3AF);
        }
        
        .btn-full {
            width: 100%;
        }
        
        @media (max-width: 768px) {
            .admin-stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .admin-table {
                font-size: 0.75rem;
            }
            
            .admin-table th,
            .admin-table td {
                padding: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div id="admin-container"></div>
    <script src="js/admin.js"></script>
</body>
</html>
